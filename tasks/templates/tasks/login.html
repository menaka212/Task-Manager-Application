<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );
            font-family:'Segoe UI',sans-serif;
            padding:20px;
        }

        .login-card{
            width:100%;
            max-width:450px;
            background:white;
            border-radius:25px;
            padding:40px;
            box-shadow:0 15px 40px rgba(0,0,0,.2);
        }

        .logo-circle{
            width:80px;
            height:80px;
            margin:auto;
            border-radius:50%;
            background:#dbeafe;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#4f46e5;
        }

        .btn-login{
            border-radius:12px;
            padding:12px;
            font-size:16px;
            font-weight:600;
        }

        .password-wrapper{
            position:relative;
        }

        .toggle-password{
            position:absolute;
            top:50%;
            right:15px;
            transform:translateY(-50%);
            cursor:pointer;
            color:#6c757d;
        }

        .register-link{
            text-decoration:none;
            font-weight:600;
        }

        .register-link:hover{
            text-decoration:underline;
        }

        @media(max-width:576px){

            .login-card{
                padding:30px 20px;
            }

            h2{
                font-size:24px;
            }

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="text-center mb-4">

        <div class="logo-circle mb-3">

            <i class="fa-solid fa-list-check fa-2x text-primary"></i>

        </div>

        <h2 class="fw-bold">
            Welcome Back
        </h2>

        <p class="text-muted">
            Login to continue managing your tasks
        </p>

    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% if error %}

        <div class="alert alert-danger">
            {{ error }}
        </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <div class="password-wrapper">

                <input
                    type="password"
                    name="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter Password"
                    required>

                <i
                    class="fa-solid fa-eye toggle-password"
                    onclick="togglePassword()">
                </i>

            </div>

        </div>

        <button
            type="submit"
            class="btn btn-primary btn-login w-100">

            Login

        </button>

    </form>

    <hr>

    <div class="text-center">

        <p class="mb-0">

            Don't have an account?

            <a
                href="{% url 'register' %}"
                class="register-link">

                Register

            </a>

        </p>

    </div>

</div>

<script>

function togglePassword(){

    let password =
    document.getElementById("password");

    if(password.type === "password"){

        password.type = "text";

    }else{

        password.type = "password";

    }

}

</script>

</body>
</html>
