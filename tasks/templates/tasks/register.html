<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );
            font-family:'Segoe UI',sans-serif;
            padding:20px;
        }

        .register-card{

            width:100%;
            max-width:500px;

            background:white;

            border-radius:25px;

            padding:40px;

            box-shadow:
            0 15px 40px rgba(0,0,0,.2);

        }

        .logo-circle{

            width:80px;
            height:80px;

            margin:auto;

            border-radius:50%;

            background:#dcfce7;

            display:flex;
            justify-content:center;
            align-items:center;

        }

        .form-control{

            border-radius:12px;
            padding:12px;

        }

        .btn-register{

            border-radius:12px;
            padding:12px;

            font-size:16px;
            font-weight:600;

        }

        .password-wrapper{
            position:relative;
        }

        .toggle-password{

            position:absolute;

            top:50%;
            right:15px;

            transform:translateY(-50%);

            cursor:pointer;

            color:#6c757d;

        }

        .login-link{

            text-decoration:none;
            font-weight:600;

        }

        .login-link:hover{

            text-decoration:underline;

        }

    </style>

</head>

<body>

<div class="register-card">

    <div class="text-center mb-4">

        <div class="logo-circle mb-3">

            <i class="fa-solid fa-user-plus fa-2x text-success"></i>

        </div>

        <h2 class="fw-bold">
            Create Account
        </h2>

        <p class="text-muted">
            Register to manage your tasks efficiently
        </p>

    </div>

    {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Full Name
            </label>

            <input
                type="text"
                name="full_name"
                class="form-control"
                placeholder="Enter your full name"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Choose a username"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <div class="password-wrapper">

                <input
                    type="password"
                    name="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter password"
                    required>

                <i
                    class="fa-solid fa-eye toggle-password"
                    onclick="togglePassword('password')">
                </i>

            </div>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Confirm Password
            </label>

            <div class="password-wrapper">

                <input
                    type="password"
                    name="confirm_password"
                    id="confirm_password"
                    class="form-control"
                    placeholder="Confirm password"
                    required>

                <i
                    class="fa-solid fa-eye toggle-password"
                    onclick="togglePassword('confirm_password')">
                </i>

            </div>

        </div>

        <button
            type="submit"
            class="btn btn-success btn-register w-100">

            Create Account

        </button>

    </form>

    <hr>

    <div class="text-center">

        <p class="mb-0">

            Already have an account?

            <a
                href="{% url 'login' %}"
                class="login-link">

                Login

            </a>

        </p>

    </div>

</div>

<script>

function togglePassword(id){

    let field = document.getElementById(id);

    if(field.type === "password"){

        field.type = "text";

    }else{

        field.type = "password";

    }

}

</script>

</body>
</html>
